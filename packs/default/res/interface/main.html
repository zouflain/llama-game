<html>
    <head>
        <link rel="stylesheet" href="file://interface/css/index.css"> 
        <script src="file://interface/uielement.js"></script>
        <script src="file://interface/radial.js"></script>

    </head>
    <body>
        <script type="text/javascript">
            function deepCopy(data){
                return JSON.parse(JSON.stringify(data));
            }
            window.GameEventBus = {
                listeners: {},
                on: function(event, callback){
                    if(!(event in window.GameEventBus.listeners)){
                        window.GameEventBus.listeners[event] = []
                    }
                    window.GameEventBus.listeners[event].push(callback);
                },
                emit: function(event, data){
                    for(const callback of window.GameEventBus.listeners[event] ?? []){
                        try{
                            callback(data);
                        }catch(err){
                            console.error(`Error in event '${event}': ${err}`);//TODO: nicer error reporting. LOG IT!
                        }
                    }
                },
                trigger: TriggerGameEvent,
                getMouse: GetMouse,
                gamepad: function(data){
                    const gamepad_change = new CustomEvent("gamepad", {
                        detail: {
                            ...data
                        },
                        bubbles: true,
                        cancelable: true
                    });
                    document.dispatchEvent(gamepad_change);
                }
            };
            //TODO: a script injector (use javascript to insert a script tag)
            let guis = {
                "combat": new CombatUI(document.querySelector("body"))
            }

                    snapMouse(JSON.stringify(center));

        </script>
    </body>
